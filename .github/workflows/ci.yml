name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm install

      - name: Run lint
        run: |
          echo "Running lint checks..."
          npm run lint --if-present

      - name: Run tests
        run: |
          echo "Running tests..."
          npm test --if-present

      - name: Build project
        run: |
          echo "Building project..."
          npm run build